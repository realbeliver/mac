project:
  title:        "SEM20 Floating-Point MAC"
  author:       "Praveen"
  discord:      ""
  description:  "18-cycle pipelined Multiply-Accumulate in a custom 20-bit float format (SEM20: 1s/6e/13m, bias=31). Accepts Q8.8 signed fixed-point operands via byte-serial protocol, internally converts to SEM20, computes MAC with persistent accumulator, decodes result back to Q8.8."
  language:     "SystemVerilog"
  clock_hz:     50000000

  tiles: "1x2"

  top_module: "tt_um_realbeliver_sem20_mac"

  source_files:
    - "tt_um_sem20_mac.v"
    - "sem20_inference_top.sv"
    - "q8p8_to_sem20.sv"
    - "sem20_mac.sv"
    - "sem20_mul.sv"
    - "sem20_acc_ip.sv"
    - "sem20_add.sv"
    - "sem20_to_q8p8.sv"

pinout:
  ui[0]: "DATA[0]"
  ui[1]: "DATA[1]"
  ui[2]: "DATA[2]"
  ui[3]: "DATA[3]"
  ui[4]: "DATA[4]"
  ui[5]: "DATA[5]"
  ui[6]: "DATA[6]"
  ui[7]: "DATA[7]"

  uo[0]: "RESULT[0]"
  uo[1]: "RESULT[1]"
  uo[2]: "RESULT[2]"
  uo[3]: "RESULT[3]"
  uo[4]: "RESULT[4]"
  uo[5]: "RESULT[5]"
  uo[6]: "RESULT[6]"
  uo[7]: "RESULT[7]"

  uio[0]: "OUT_VALID (output)"
  uio[1]: "BUSY (output)"
  uio[2]: "CMD[0] (input)"
  uio[3]: "CMD[1] (input)"
  uio[4]: "BYTE_SEL (input)"
  uio[5]: "CLR_ACC (input)"
  uio[6]: "RESULT_HI (input)"
  uio[7]: ""

yaml_version: 6
